version: '3.8'

services:
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: lobechat_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=lobechat
    volumes:
      - /volume1/Docker/lobechat/postgres:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lobechat_redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - /volume1/Docker/lobechat/redis:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lobechat_minio
    environment:
      - MINIO_ROOT_USER=minio_admin
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - /volume1/Docker/lobechat/minio:/data
    command: server /data --console-address ":9001"
    restart: always
    ports:
      - "9000:9000"  # S3 API port
      - "9001:9001"  # MinIO Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  lobechat:
    image: lobehub/lobe-chat:latest
    container_name: lobechat
    ports:
      - "3210:3210"
    environment:
      - PUID=1000
      - PGID=999
      - TZ=Etc/UTC

      # --- Server/Database Mode ---
      - NEXT_PUBLIC_SERVICE_MODE=server
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgresql:5432/lobechat
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0

      # --- S3 File Storage Configuration ---
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_NAME=lobechat
      - S3_ACCESS_KEY_ID=minio_admin
      - S3_SECRET_ACCESS_KEY=${MINIO_PASSWORD}
      - S3_PUBLIC_DOMAIN=http://soliss.mooo.com:9000/lobechat

      # --- Security / Encryption ---
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ACCESS_CODE=${ACCESS_CODE}

      # --- Locked Local Model List ---
      - CUSTOM_MODELS=+AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-MLX-FP4,+mlx-community/gemma-4-12B-it-8bit,-all

      # --- Cloud Providers ---
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}

    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
