# CI: model-free test suite + lint on every push/PR, and a scheduled fresh-install
# canary that catches transitive-dependency drift (the transformers-5.13 class of
# breakage — see scripts/smoke_install.sh) BEFORE a user hits it.
#
# Runners: macos-14+ are Apple-Silicon VMs; Metal may be unavailable inside the VM,
# so tests/conftest.py falls back to the CPU device. No model weights are downloaded.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1" # weekly dep-drift canary (Mon 06:17 UTC)
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install (resolves latest deps, like a user)
        # setup-uv with python-version already creates + activates .venv in the workspace;
        # --allow-existing keeps this line working either way
        run: |
          uv venv --allow-existing
          uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check src tests
      - name: Model-free test suite
        run: uv run pytest tests/ -q

  smoke-install:
    # Fresh venv resolving the LATEST compatible deps, like a new user's
    # `pip install mlx-dspark` — then the import that has broken before.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: smoke_install.sh --tests
        run: bash scripts/smoke_install.sh --tests
